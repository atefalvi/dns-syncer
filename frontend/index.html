<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DNS Syncer — by DataDreamer</title>
  <link rel="icon" href="/assets/datadreamer-logo.svg">

  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="/assets/datadreamer-logo.svg" alt="DataDreamer">

          <div class="by">by DataDreamer</div>
